<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SURFseq Report Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ─── RESET & TOKENS ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0f1a;
  --surface:   #111827;
  --surface2:  #1a2233;
  --border:    #1e2d45;
  --accent:    #38bdf8;
  --accent2:   #0ea5e9;
  --released:  #14532d;
  --released-bg: #052e16;
  --released-border: #16a34a;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --danger:    #ef4444;
  --success:   #22c55e;
  --warn:      #f59e0b;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius:    8px;
  --shadow:    0 4px 32px rgba(0,0,0,.5);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── NOISE TEXTURE ───────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ─── TOP NAVBAR ─────────────────────────────────────── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: rgba(11,15,26,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand span { color: var(--text); }

.nav-right { display: flex; align-items: center; gap: 14px; }

.badge-user {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.badge-user.admin { border-color: var(--accent); color: var(--accent); }

/* ─── BUTTONS ────────────────────────────────────────── */
button {
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  border: none;
  border-radius: var(--radius);
  padding: 8px 16px;
  transition: all .18s;
}
.btn-primary {
  background: var(--accent);
  color: #000;
  font-weight: 500;
}
.btn-primary:hover { background: #7dd3fc; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(239,68,68,.3);
}
.btn-danger:hover { background: rgba(239,68,68,.1); }

.btn-success {
  background: var(--success);
  color: #000;
  font-weight: 500;
  font-size: 11px;
  padding: 5px 12px;
}
.btn-success:hover { background: #4ade80; }

/* ─── LOGIN MODAL ────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .2s ease;
}
.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px;
  width: 380px;
  box-shadow: var(--shadow);
  animation: slideUp .25s ease;
}
.modal-box h2 {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.modal-box p { color: var(--muted); font-size: 12px; margin-bottom: 24px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
.form-group input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .18s;
}
.form-group input:focus { border-color: var(--accent); }

.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.modal-actions button { flex: 1; padding: 11px; font-size: 13px; }

.error-msg { color: var(--danger); font-size: 11px; margin-top: 10px; min-height: 16px; }

/* ─── MAIN CONTENT ───────────────────────────────────── */
.container {
  position: relative;
  z-index: 1;
  padding: 28px;
  max-width: 100%;
}

/* ─── TOOLBAR ────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 20px;
}

.toolbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.toolbar-right { display: flex; align-items: center; gap: 12px; }

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 320px;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 9px 14px 9px 36px;
  outline: none;
  transition: border-color .18s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap .icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}

/* ─── TOGGLE SWITCH ─────────────────────────────────── */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.toggle-wrap input[type="checkbox"] { display: none; }
.toggle-track {
  width: 40px;
  height: 22px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 11px;
  position: relative;
  transition: background .2s, border-color .2s;
}
.toggle-wrap input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
.toggle-track::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  top: 2px;
  left: 2px;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.toggle-wrap input:checked + .toggle-track::after { transform: translateX(18px); }
.toggle-label { color: var(--text); }

/* ─── STATS BAR ─────────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.stat-chip .num { font-family: var(--font-head); font-size: 18px; font-weight: 700; }
.stat-chip.active .num { color: var(--accent); }
.stat-chip.released .num { color: var(--success); }
.stat-chip.total .num { color: var(--warn); }

/* ─── TABLE WRAPPER ─────────────────────────────────── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: auto;
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

thead tr {
  background: var(--surface2);
  border-bottom: 2px solid var(--border);
}

th {
  font-family: var(--font-head);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  padding: 13px 14px;
  text-align: left;
  white-space: nowrap;
}

td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

tbody tr { transition: background .15s; }
tbody tr:hover { background: rgba(56,189,248,.04); }
tbody tr:last-child td { border-bottom: none; }

/* Released rows */
tbody tr.row-released {
  background: rgba(5,46,22,.5);
  border-left: 3px solid var(--released-border);
}
tbody tr.row-released td { color: #86efac; }
tbody tr.row-released:hover { background: rgba(5,46,22,.7); }

/* ─── STATUS PILL ────────────────────────────────────── */
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.pill-unreleased { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
.pill-released   { background: rgba(22,163,74,.15);  color: var(--success); border: 1px solid rgba(22,163,74,.4); }

/* ─── RELEASE MODAL ─────────────────────────────────── */
.release-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
}
.release-modal-overlay.hidden { display: none; }

.release-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  width: 400px;
  box-shadow: var(--shadow);
  animation: slideUp .25s ease;
}
.release-modal h3 { font-family: var(--font-head); font-size: 18px; margin-bottom: 6px; }
.release-modal .sub { color: var(--muted); font-size: 12px; margin-bottom: 22px; }

.release-info {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 18px;
  font-size: 12px;
  line-height: 1.8;
}
.release-info strong { color: var(--accent); }

.release-modal .form-group label { color: var(--muted); }

.release-actions { display: flex; gap: 10px; margin-top: 18px; }
.release-actions button { flex: 1; padding: 11px; }

/* ─── LOADING / EMPTY STATES ─────────────────────────── */
.state-row td {
  text-align: center;
  padding: 60px;
  color: var(--muted);
}
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST ──────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 12px;
  min-width: 220px;
  animation: slideUp .2s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error   { border-left: 3px solid var(--danger); }

/* ─── REFRESH INDICATOR ──────────────────────────────── */
.refresh-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  display: inline-block;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .4; transform: scale(.7); }
}

/* ─── RELEASED BADGE ON ROW ──────────────────────────── */
.released-badge {
  font-size: 9px;
  background: rgba(22,163,74,.2);
  color: var(--success);
  border: 1px solid rgba(22,163,74,.4);
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: 6px;
  letter-spacing: .04em;
  vertical-align: middle;
}

/* ─── RESPONSIVE ────────────────────────────────────── */
@media (max-width: 640px) {
  .navbar { padding: 12px 16px; }
  .container { padding: 16px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-wrap { max-width: 100%; }
}
</style>
</head>

<body>

<!-- ══ NAVBAR ══════════════════════════════════════════ -->
<nav class="navbar">
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    SURF<span>seq</span> &nbsp;Report Portal
  </div>
  <div class="nav-right">
    <span class="refresh-dot"></span>
    <span id="lastRefreshLabel" style="font-size:11px;color:var(--muted)">Connecting…</span>
    <span id="userBadge" class="badge-user">GUEST</span>
    <button id="authBtn" class="btn-ghost" onclick="openLoginModal()">Admin Login</button>
  </div>
</nav>

<!-- ══ LOGIN MODAL ════════════════════════════════════ -->
<div id="loginModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <p>Enter your credentials to manage report releases</p>
    <div class="form-group">
      <label>Admin ID</label>
      <input type="text" id="loginId" placeholder="Enter ID" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" />
    </div>
    <div id="loginError" class="error-msg"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeLoginModal()">Cancel</button>
      <button class="btn-primary" onclick="handleLogin()">Login</button>
    </div>
  </div>
</div>

<!-- ══ RELEASE CONFIRM MODAL ═══════════════════════════ -->
<div id="releaseModal" class="release-modal-overlay hidden">
  <div class="release-modal">
    <h3>Mark as Released</h3>
    <p class="sub">This will hide the row in Google Sheets and mark the report as released.</p>
    <div class="release-info" id="releaseInfo">—</div>
    <div class="form-group">
      <label>Report Release Date</label>
      <input type="date" id="releaseDateInput" />
    </div>
    <div id="releaseError" class="error-msg"></div>
    <div class="release-actions">
      <button class="btn-ghost" onclick="closeReleaseModal()">Cancel</button>
      <button class="btn-success" onclick="confirmRelease()">✓ Confirm Release</button>
    </div>
  </div>
</div>

<!-- ══ TOAST CONTAINER ═══════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ══ MAIN ═══════════════════════════════════════════ -->
<div class="container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip active">
      <div>
        <div class="num" id="statActive">—</div>
        <div style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Unreleased</div>
      </div>
    </div>
    <div class="stat-chip released">
      <div>
        <div class="num" id="statReleased">—</div>
        <div style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Released</div>
      </div>
    </div>
    <div class="stat-chip total">
      <div>
        <div class="num" id="statTotal">—</div>
        <div style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Total</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search by ID, name, client…" oninput="renderTable()" />
      </div>
    </div>
    <div class="toolbar-right">
      <label class="toggle-wrap">
        <input type="checkbox" id="showReleasedToggle" onchange="renderTable()" />
        <span class="toggle-track"></span>
        <span class="toggle-label">Show Released</span>
      </label>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead id="tableHead"><tr><th colspan="20"><div class="spinner"></div></th></tr></thead>
      <tbody id="tableBody"><tr class="state-row"><td colspan="20">Loading data…</td></tr></tbody>
    </table>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG — paste your deployed Apps Script URL here
// ══════════════════════════════════════════════════════
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzioALRQDTRrYnUwXsRzX6rUuiYV1TR127w_1mE9jHLY6tWC4mDNJHX006u9XnA95V6Pw/exec";

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
var state = {
  isAdmin:    false,
  token:      null,
  allRows:    [],
  headers:    [],
  pending:    null,   // row waiting for release confirm
};

var REFRESH_INTERVAL = 30000; // 30 seconds silent refresh

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
window.addEventListener("DOMContentLoaded", function () {
  fetchData();
  setInterval(function () { fetchData(true); }, REFRESH_INTERVAL);

  // Enter key on login
  document.getElementById("loginPass").addEventListener("keydown", function (e) {
    if (e.key === "Enter") handleLogin();
  });
});

// ══════════════════════════════════════════════════════
//  API CALLS
// ══════════════════════════════════════════════════════
function api(payload) {
  return fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" }, // avoid CORS preflight
    body: JSON.stringify(payload),
  }).then(function (r) { return r.json(); });
}

function fetchData(silent) {
  if (!silent) {
    document.getElementById("tableBody").innerHTML =
      '<tr class="state-row"><td colspan="20"><div class="spinner"></div><br>Loading…</td></tr>';
  }

  api({ action: "getData" }).then(function (res) {
    if (!res.success) { showToast("Failed to load data: " + res.error, "error"); return; }
    state.headers = res.headers;
    state.allRows = res.rows;
    renderTable();
    updateStats();
    var now = new Date();
    document.getElementById("lastRefreshLabel").textContent =
      "Updated " + now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }).catch(function (e) {
    if (!silent) showToast("Network error. Check Apps Script URL.", "error");
  });
}

// ══════════════════════════════════════════════════════
//  RENDER TABLE
// ══════════════════════════════════════════════════════
function renderTable() {
  var showReleased = document.getElementById("showReleasedToggle").checked;
  var search       = document.getElementById("searchInput").value.toLowerCase().trim();

  var filtered = state.allRows.filter(function (row) {
    var isReleased = row["__hidden__"];
    if (!showReleased && isReleased) return false;

    if (search) {
      var allVals = Object.values(row).join(" ").toLowerCase();
      if (!allVals.includes(search)) return false;
    }
    return true;
  });

  // Build header
  var thead = document.getElementById("tableHead");
  var headRow = "<tr>";
  state.headers.forEach(function (h) {
    headRow += "<th>" + escHtml(String(h)) + "</th>";
  });
  if (state.isAdmin) headRow += "<th>ACTION</th>";
  headRow += "</tr>";
  thead.innerHTML = headRow;

  // Build body
  var tbody = document.getElementById("tableBody");
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr class="state-row"><td colspan="' + (state.headers.length + 1) +
      '">No records found</td></tr>';
    return;
  }

  var rows = "";
  filtered.forEach(function (row) {
    var isReleased = row["__hidden__"];
    rows += '<tr class="' + (isReleased ? "row-released" : "") + '">';

    state.headers.forEach(function (h) {
      var val = row[h] !== undefined ? row[h] : "";
      var display = escHtml(String(val));

      // Highlight "REPORT RELEASE DATE" column
      if (String(h).trim().toUpperCase() === "REPORT RELEASE DATE" && val) {
        display = '<span style="color:var(--success)">' + display + '</span>';
      }
      // Status-like column
      if (String(h).trim().toUpperCase() === "STATUS") {
        if (String(val).toLowerCase() === "released") {
          display = '<span class="pill pill-released">Released</span>';
        } else if (val) {
          display = '<span class="pill pill-unreleased">' + escHtml(String(val)) + '</span>';
        }
      }

      rows += "<td>" + display;
      // Show badge on first column if released
      if (h === state.headers[0] && isReleased) {
        rows += '<span class="released-badge">HIDDEN IN SHEET</span>';
      }
      rows += "</td>";
    });

    // Admin action column
    if (state.isAdmin) {
      if (isReleased) {
        rows += '<td><span style="color:var(--success);font-size:11px">✓ Released</span></td>';
      } else {
        rows += '<td><button class="btn-success" onclick="openReleaseModal(' +
          row["__rowIndex__"] + ', ' + JSON.stringify(JSON.stringify(row)) + ')">Release</button></td>';
      }
    }

    rows += "</tr>";
  });

  tbody.innerHTML = rows;
}

function updateStats() {
  var total    = state.allRows.length;
  var released = state.allRows.filter(function (r) { return r["__hidden__"]; }).length;
  var active   = total - released;
  document.getElementById("statTotal").textContent    = total;
  document.getElementById("statReleased").textContent = released;
  document.getElementById("statActive").textContent   = active;
}

// ══════════════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════════════
function openLoginModal()  { document.getElementById("loginModal").classList.remove("hidden"); }
function closeLoginModal() { document.getElementById("loginModal").classList.add("hidden"); document.getElementById("loginError").textContent = ""; }

function handleLogin() {
  var id   = document.getElementById("loginId").value.trim();
  var pass = document.getElementById("loginPass").value;
  document.getElementById("loginError").textContent = "Verifying…";

  api({ action: "login", id: id, password: pass }).then(function (res) {
    if (res.success) {
      state.isAdmin = true;
      state.token   = res.token;
      closeLoginModal();
      document.getElementById("userBadge").textContent = "ADMIN";
      document.getElementById("userBadge").classList.add("admin");
      document.getElementById("authBtn").textContent = "Logout";
      document.getElementById("authBtn").onclick = handleLogout;
      renderTable();
      showToast("Logged in as Admin", "success");
    } else {
      document.getElementById("loginError").textContent = "Invalid credentials. Try again.";
    }
  }).catch(function () {
    document.getElementById("loginError").textContent = "Network error.";
  });
}

function handleLogout() {
  state.isAdmin = false;
  state.token   = null;
  document.getElementById("userBadge").textContent = "GUEST";
  document.getElementById("userBadge").classList.remove("admin");
  document.getElementById("authBtn").textContent = "Admin Login";
  document.getElementById("authBtn").onclick = openLoginModal;
  renderTable();
  showToast("Logged out", "success");
}

// ══════════════════════════════════════════════════════
//  RELEASE MODAL
// ══════════════════════════════════════════════════════
function openReleaseModal(rowIndex, rowJsonStr) {
  var row = JSON.parse(rowJsonStr);
  state.pending = { rowIndex: rowIndex, row: row };

  // Fill info box
  var info = "";
  var infoKeys = ["S.NO", "Sample_Name", "Gen_ID", "Anderson_ID", "Client", "Test"];
  infoKeys.forEach(function (k) {
    if (row[k] !== undefined && row[k] !== "") {
      info += "<b>" + escHtml(k) + ":</b> " + escHtml(String(row[k])) + "<br>";
    }
  });
  // Fallback: show first 4 fields
  if (!info) {
    Object.keys(row).slice(0, 4).forEach(function (k) {
      if (!k.startsWith("__")) {
        info += "<b>" + escHtml(k) + ":</b> " + escHtml(String(row[k])) + "<br>";
      }
    });
  }
  document.getElementById("releaseInfo").innerHTML = info || "—";

  // Set default date to today
  var today = new Date();
  var yyyy  = today.getFullYear();
  var mm    = String(today.getMonth() + 1).padStart(2, "0");
  var dd    = String(today.getDate()).padStart(2, "0");
  document.getElementById("releaseDateInput").value = yyyy + "-" + mm + "-" + dd;
  document.getElementById("releaseError").textContent = "";

  document.getElementById("releaseModal").classList.remove("hidden");
}

function closeReleaseModal() {
  document.getElementById("releaseModal").classList.add("hidden");
  state.pending = null;
}

function confirmRelease() {
  if (!state.pending) return;
  var dateVal = document.getElementById("releaseDateInput").value;
  if (!dateVal) { document.getElementById("releaseError").textContent = "Please select a date."; return; }

  // Convert YYYY-MM-DD → DD-MM-YYYY for the sheet
  var parts = dateVal.split("-");
  var formatted = parts[2] + "-" + parts[1] + "-" + parts[0];

  document.getElementById("releaseError").textContent = "Releasing…";

  api({
    action:      "releaseReport",
    rowIndex:    state.pending.rowIndex,
    releaseDate: formatted,
    token:       state.token,
  }).then(function (res) {
    if (res.success) {
      closeReleaseModal();
      showToast("Report released & hidden in sheet ✓", "success");
      fetchData(true);
    } else {
      document.getElementById("releaseError").textContent = res.error || "Failed";
    }
  }).catch(function () {
    document.getElementById("releaseError").textContent = "Network error.";
  });
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function showToast(msg, type) {
  var tc  = document.getElementById("toastContainer");
  var div = document.createElement("div");
  div.className = "toast " + (type || "");
  div.innerHTML = (type === "success" ? "✓" : "✕") + "&nbsp;" + escHtml(msg);
  tc.appendChild(div);
  setTimeout(function () { div.remove(); }, 3500);
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
</script>
